name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint markdown
        run: markdownlint '**/*.md' --ignore node_modules --ignore .git

      - name: Lint JSON
        run: |
          set -e
          for f in $(find . -name '*.json' -not -path './node_modules/*' -not -path './.git/*'); do
            python3 -c "import json; json.load(open('$f'))" || (echo "FAIL: $f" && exit 1)
          done

      - name: Lint YAML
        run: |
          pip install pyyaml
          set -e
          for f in $(find . \( -name '*.yaml' -o -name '*.yml' \) -not -path './node_modules/*' -not -path './.git/*'); do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || (echo "FAIL: $f" && exit 1)
          done

      - name: Validate plugin metadata
        run: |
          python3 - <<'PY'
          import json
          import sys

          # plugin.json — schema per Claude Code Plugins reference.
          # Required: name; recommended: version, description, author, license, repository, homepage.
          plugin = json.load(open('.claude-plugin/plugin.json'))
          for k in ('name', 'version', 'description', 'author', 'license'):
              assert k in plugin, f'plugin.json missing recommended field: {k}'
          assert isinstance(plugin['name'], str) and plugin['name'], 'plugin.json name must be non-empty string'
          print('plugin.json: OK')

          # marketplace.json — schema per Plugin Marketplaces reference.
          # Top-level: name, owner, plugins (array). Each plugin entry needs name, description, source.
          # source must be a string ("./") or object ({source, repo, ...}).
          marketplace = json.load(open('.claude-plugin/marketplace.json'))
          for k in ('name', 'owner', 'plugins'):
              assert k in marketplace, f'marketplace.json missing required field: {k}'
          assert isinstance(marketplace['plugins'], list) and marketplace['plugins'], \
              'marketplace.json plugins must be a non-empty array'
          for i, p in enumerate(marketplace['plugins']):
              for k in ('name', 'description', 'source'):
                  assert k in p, f'marketplace.json plugins[{i}] missing field: {k}'
              src = p['source']
              if isinstance(src, dict):
                  assert 'source' in src, f'marketplace.json plugins[{i}].source object missing inner "source" key'
              elif not isinstance(src, str):
                  raise AssertionError(f'marketplace.json plugins[{i}].source must be string or object')
          print('marketplace.json: OK')
          PY

      - name: Validate internal references
        run: |
          python3 - <<'PY'
          import os, re, sys, glob
          fail = []

          # A. No references to the removed dev design-spec ("spec §N"), and no docs/superpowers/
          #    pointers, in any shipped file. (CHANGELOG/.gitignore document the removal — exempt.)
          spec_re = re.compile(r'spec\s+§\s*\d', re.IGNORECASE)
          exempt = {'CHANGELOG.md', '.gitignore', 'PUBLISH.md'}  # these document the removal/guard, by design
          for path in glob.glob('**/*', recursive=True):
              if not os.path.isfile(path):
                  continue
              if path.startswith('.git/') or 'node_modules/' in path or path in exempt:
                  continue
              if not path.endswith(('.md', '.kt', '.yaml', '.yml', '.json', '.py')):
                  continue
              text = open(path, encoding='utf-8', errors='ignore').read()
              if spec_re.search(text):
                  fail.append(f'{path}: references removed design spec ("spec §N") — point to shared/schemas.md')
              if 'docs/superpowers/' in text:
                  fail.append(f'{path}: references docs/superpowers/ (dev-only, not shipped)')

          # B. Every docs/ or shared/ file path named in skills/ and agents/ must exist on disk
          #    (catches broken lazy-reference paths).
          ref_re = re.compile(r'(?:docs|shared)/[A-Za-z0-9_./-]+\.(?:md|kt|yaml|yml)')
          for path in glob.glob('skills/**/*.md', recursive=True) + glob.glob('agents/*.md', recursive=True):
              text = open(path, encoding='utf-8', errors='ignore').read()
              for ref in sorted(set(ref_re.findall(text))):
                  if not os.path.isfile(ref):
                      fail.append(f'{path}: broken lazy-reference path -> {ref}')

          if fail:
              print('Internal reference check FAILED:')
              for f in fail:
                  print('  -', f)
              sys.exit(1)
          print('Internal reference check: OK')
          PY
