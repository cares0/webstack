name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint markdown
        run: markdownlint '**/*.md' --ignore node_modules --ignore .git

      - name: Lint JSON
        run: |
          set -e
          for f in $(find . -name '*.json' -not -path './node_modules/*' -not -path './.git/*'); do
            python3 -c "import json; json.load(open('$f'))" || (echo "FAIL: $f" && exit 1)
          done

      - name: Lint YAML
        run: |
          pip install pyyaml
          set -e
          for f in $(find . \( -name '*.yaml' -o -name '*.yml' \) -not -path './node_modules/*' -not -path './.git/*'); do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || (echo "FAIL: $f" && exit 1)
          done

      - name: Validate plugin metadata
        run: |
          python3 - <<'PY'
          import json
          import sys

          # plugin.json — schema per Claude Code Plugins reference.
          # Required: name; recommended: version, description, author, license, repository, homepage.
          plugin = json.load(open('.claude-plugin/plugin.json'))
          for k in ('name', 'version', 'description', 'author', 'license'):
              assert k in plugin, f'plugin.json missing recommended field: {k}'
          assert isinstance(plugin['name'], str) and plugin['name'], 'plugin.json name must be non-empty string'
          print('plugin.json: OK')

          # marketplace.json — schema per Plugin Marketplaces reference.
          # Top-level: name, owner, plugins (array). Each plugin entry needs name, description, source.
          # source must be a string ("./") or object ({source, repo, ...}).
          marketplace = json.load(open('.claude-plugin/marketplace.json'))
          for k in ('name', 'owner', 'plugins'):
              assert k in marketplace, f'marketplace.json missing required field: {k}'
          assert isinstance(marketplace['plugins'], list) and marketplace['plugins'], \
              'marketplace.json plugins must be a non-empty array'
          for i, p in enumerate(marketplace['plugins']):
              for k in ('name', 'description', 'source'):
                  assert k in p, f'marketplace.json plugins[{i}] missing field: {k}'
              src = p['source']
              if isinstance(src, dict):
                  assert 'source' in src, f'marketplace.json plugins[{i}].source object missing inner "source" key'
              elif not isinstance(src, str):
                  raise AssertionError(f'marketplace.json plugins[{i}].source must be string or object')
          print('marketplace.json: OK')
          PY
