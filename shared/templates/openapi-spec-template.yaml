openapi: 3.1.0
info:
  title: <feature> API
  version: 0.1.0
  description: |
    Generated from `.webstack/features/<feature>/plan.md` by /webstack:feature P3.
    Single source of truth — frontend codegen and backend implementation derive from this.

    NOTE: webstack does not bundle authentication. If this feature requires auth,
    add a `securitySchemes.bearerAuth` (or similar) entry under `components` and a
    `security: [{ bearerAuth: [] }]` block at the operation or document level, and
    declare `'401'` responses where applicable. See `docs/recipes/spring-security-auth.md`
    for the recommended Spring Security implementation.
servers:
  - url: http://localhost:8080
    description: Local dev
  - url: https://api-staging.example.com
    description: Staging
  - url: https://api.example.com
    description: Production

tags:
  - name: <resource>
    description: <one line>

paths:
  /<resource>:
    get:
      tags: [<resource>]
      summary: List <resource>
      operationId: list<Resource>
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: cursor
          in: query
          schema: { type: [string, "null"] }
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/<Resource>List'
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      tags: [<resource>]
      summary: Create <resource>
      operationId: create<Resource>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/<Resource>CreateRequest'
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/<Resource>'
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalError' }

  /<resource>/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [<resource>]
      summary: Get one <resource>
      operationId: get<Resource>
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/<Resource>'
        '404': { $ref: '#/components/responses/NotFound' }

components:
  schemas:
    <Resource>:
      type: object
      required: [id, createdAt]
      properties:
        id: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        # add resource-specific fields here

    <Resource>CreateRequest:
      type: object
      required: []
      properties:
        # add request-specific fields here

    <Resource>List:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/<Resource>'
        nextCursor:
          type: [string, "null"]

    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        details:
          type: object
          additionalProperties: true

  responses:
    BadRequest:
      description: Bad request — request shape invalid
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    UnprocessableEntity:
      description: Validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
